<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-black text-gray-800">Listado de <span class="text-indigo-600">Alumnos</span></h2>
    <div class="flex gap-2">
      <!-- Botón Añadir -->
      <button 
        (click)="addStudent()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-plus-lg text-lg"></i>
        Añadir
      </button>

      <!-- Botón Refrescar -->
      <button 
        (click)="refreshData()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-arrow-clockwise text-lg"></i>
        Refrescar
      </button>

      <!-- Botón Guardar / Actualizar -->
      <button 
        (click)="saveChanges()"
        class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-amber-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-floppy text-lg"></i>
        Guardar
      </button>

      <!-- Botón Eliminar -->
      <button 
        (click)="deleteSelected()"
        class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-red-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-trash text-lg"></i>
        Eliminar
      </button>

      <!-- Botón Imprimir -->
      <button 
        (click)="openPrintModal()"
        class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-emerald-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-printer text-lg"></i>
        Imprimir
      </button>
    </div>
  </div>

  <div class="ag-theme-quartz shadow-sm rounded-2xl overflow-hidden border border-gray-200" style="height: 85vh; width: 100%;">
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        [columnDefs]="columnDefs()"
        [rowData]="rowData()"
        (gridReady)="onGridReady($event)"
        rowSelection="single"
        (cellValueChanged)="onCellValueChanged($event)"
        (cellDoubleClicked)="onCellDoubleClicked($event)">
      </ag-grid-angular>
    </div>

    <!-- Print Modal -->
    @if (isPrintModalOpen()) {
      <div class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 flex justify-center items-center">
        <div class="relative bg-white p-8 rounded-lg shadow-xl w-11/12 md:w-1/2 lg:w-1/3">
          <h3 class="text-xl font-bold mb-4">Opciones de Impresión</h3>
          <p class="mb-6 text-gray-700">Aquí podrás añadir filtros para seleccionar qué datos deseas imprimir.</p>

          <div class="space-y-4 mb-6">
            <!-- Filtro por Grado -->
            <div>
              <label class="block text-sm font-medium text-gray-700">Grado</label>
              <input 
                type="text" 
                [ngModel]="printFilterGrade()" 
                (ngModelChange)="printFilterGrade.set($event)"
                placeholder="Ej. 1"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-gray-200">
            </div>

            <!-- Filtro por Grupo -->
            <div>
              <label class="block text-sm font-medium text-gray-700">Grupo</label>
              <input 
                type="text" 
                [ngModel]="printFilterGroup()" 
                (ngModelChange)="printFilterGroup.set($event)"
                placeholder="Ej. A"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-gray-200">
            </div>

            <!-- Filtro por Carrera / Programa -->
            <div>
              <label class="block text-sm font-medium text-gray-700">Carrera / Programa</label>
              <select 
                [ngModel]="printFilterCourse()" 
                (ngModelChange)="printFilterCourse.set($event)"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-gray-200">
                <option [value]="0">Todas las carreras</option>
                @for (course of coursesVigentes(); track course.id) {
                  <option [value]="course.id">{{ course.name }}</option>
                }
              </select>
            </div>
          </div>

          <div class="flex justify-end gap-4">
            <button 
              (click)="closePrintModal()"
              class="px-4 py-2 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400 transition-colors">
              Cancelar
            </button>
            <button 
              (click)="confirmPrint()"
              class="px-4 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 transition-colors">
              Imprimir Seleccionados
            </button>
          </div>
        </div>
      </div>
    }
</div>
