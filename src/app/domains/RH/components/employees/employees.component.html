<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-black text-gray-800">Listado de <span class="text-indigo-600">Empleados</span></h2>
    
    <div class="flex gap-2">
      <!-- Botón Añadir -->
      <button 
        (click)="addEmployee()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-plus-lg text-lg"></i>
        Añadir
      </button>

      <!-- Botón Refrescar -->
      <button 
        (click)="refreshData()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-arrow-clockwise text-lg"></i>
        Refrescar
      </button>

      <!-- Botón Guardar / Actualizar -->
      <button 
        (click)="saveChanges()"
        class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-amber-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-floppy text-lg"></i>
        Guardar
      </button>

      <!-- Botón Eliminar -->
      <button 
        (click)="deleteSelected()"
        class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-red-200 transition-all active:scale-95 flex items-center gap-2">
        <i class="bi bi-trash text-lg"></i>
        Eliminar
      </button>
    </div>
  </div>

  <div class="ag-theme-quartz shadow-sm rounded-2xl overflow-hidden border border-gray-200" style="height: 75vh; width: 100%;">
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        [columnDefs]="columnDefs()"
        [rowData]="rowData()"
        (gridReady)="onGridReady($event)"
        rowSelection="single"
        (cellValueChanged)="onCellValueChanged($event)"
        (cellDoubleClicked)="onCellDoubleClicked($event)">
      </ag-grid-angular>
    </div>
</div>
